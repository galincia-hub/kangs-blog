<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아카이브 — Pagery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f4;
  --bg-panel: #f5f1eb;
  --bg-card: #efeae3;
  --bg-card-hover: #e8e2d9;
  --bg-card-selected: #e5ded4;
  --bg-tag: #e8e2d9;
  --bg-tag-active: #2d2a26;
  --bg-input: #f5f1eb;
  --text: #2d2a26;
  --text-secondary: #8a8078;
  --text-tag-active: #faf8f4;
  --border: #ddd6cc;
  --border-focus: #a07d5a;
  --accent: #a07d5a;
  --tab-active-bg: #2d2a26;
  --tab-active-text: #faf8f4;
  --highlight: #fde68a;
  --source-claude: #b45309;
  --source-code: #047857;
  --source-lilys: #6d28d9;
  --source-memo: #78716c;
  --dim-label: #b0a898;
  --action-todo: #d97706;
  --action-ref: #6b7280;
  --action-done: #059669;
  --action-hold: #9333ea;
  --font-sans: 'IBM Plex Sans KR', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --radius: 8px;
  --radius-sm: 5px;
  --transition: 0.15s ease;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --bg: #1e1e1e;
  --bg-panel: #282828;
  --bg-card: #303030;
  --bg-card-hover: #383838;
  --bg-card-selected: #3c3c3c;
  --bg-tag: #404040;
  --bg-tag-active: #d8d5cf;
  --bg-input: #303030;
  --text: #d8d5cf;
  --text-secondary: #a09a90;
  --text-tag-active: #1e1e1e;
  --border: #404040;
  --border-focus: #c9a87c;
  --accent: #c9a87c;
  --tab-active-bg: #d8d5cf;
  --tab-active-text: #1e1e1e;
  --highlight: #854d0e;
  --source-claude: #f0b940;
  --source-code: #4ade80;
  --source-lilys: #b09aee;
  --source-memo: #a09a90;
  --dim-label: #6a6560;
  --action-todo: #fbbf24;
  --action-ref: #9ca3af;
  --action-done: #34d399;
  --action-hold: #c084fc;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* ── NAV ── */
nav { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--border); background:var(--bg-panel); position:sticky; top:0; z-index:100; }
nav .logo { font-weight:600; font-size:15px; letter-spacing:-0.02em; text-decoration:none; color:var(--text); }
nav .nav-links { display:flex; align-items:center; gap:20px; }
nav .nav-links a { font-size:13px; color:var(--text-secondary); text-decoration:none; transition:color var(--transition); }
nav .nav-links a:hover, nav .nav-links a.active { color:var(--text); }
.theme-toggle { background:none; border:none; cursor:pointer; font-size:14px; padding:4px 6px; color:var(--text-secondary); border-radius:var(--radius-sm); transition:background var(--transition); }
.theme-toggle:hover { background:var(--bg-tag); }

/* ── HEADER ── */
.archive-header { padding:28px 28px 0; max-width:1440px; margin:0 auto; }
.archive-header h1 { font-size:20px; font-weight:600; letter-spacing:-0.03em; margin-bottom:3px; }
.archive-header p { font-size:13px; color:var(--text-secondary); margin-bottom:20px; }

/* ── CONTROLS ── */
.controls { max-width:1440px; margin:0 auto; padding:0 28px; }
.tabs-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.tabs { display:flex; gap:4px; }
.tab { padding:6px 14px; font-size:13px; font-weight:500; border:1px solid var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--text-secondary); cursor:pointer; transition:all var(--transition); font-family:var(--font-sans); }
.tab:hover { color:var(--text); border-color:var(--text-secondary); }
.tab.active { background:var(--tab-active-bg); color:var(--tab-active-text); border-color:transparent; }
.tab .count { font-size:11px; font-weight:400; margin-left:5px; opacity:0.6; }
.sort-toggle { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); cursor:pointer; padding:5px 10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:transparent; font-family:var(--font-sans); transition:all var(--transition); }
.sort-toggle:hover { border-color:var(--text-secondary); color:var(--text); }

/* Search */
.search-bar { position:relative; margin-bottom:12px; }
.search-bar input { width:100%; padding:9px 14px 9px 36px; font-size:13px; font-family:var(--font-sans); border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-input); color:var(--text); outline:none; transition:border-color var(--transition); }
.search-bar input:focus { border-color:var(--border-focus); }
.search-bar input::placeholder { color:var(--text-secondary); opacity:0.7; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--text-secondary); pointer-events:none; }

/* ── 3차원 태그 필터 ── */
.filter-section { margin-bottom:16px; }
.filter-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; }
.filter-label { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--dim-label); min-width:52px; padding-top:5px; flex-shrink:0; }
.filter-chips { display:flex; flex-wrap:wrap; gap:4px; }
.tag-chip { padding:3px 10px; font-size:11.5px; font-weight:500; border-radius:20px; background:var(--bg-tag); color:var(--text-secondary); cursor:pointer; transition:all var(--transition); border:none; font-family:var(--font-sans); white-space:nowrap; }
.tag-chip:hover { color:var(--text); }
.tag-chip.active { background:var(--bg-tag-active); color:var(--text-tag-active); }
/* action 색상 */
.tag-chip[data-action="후속작업"].active { background:var(--action-todo); color:#fff; }
.tag-chip[data-action="참고"].active { background:var(--action-ref); color:#fff; }
.tag-chip[data-action="반영완료"].active { background:var(--action-done); color:#fff; }
.tag-chip[data-action="보류"].active { background:var(--action-hold); color:#fff; }

/* ── MAIN LAYOUT ── */
.main-layout { display:grid; grid-template-columns:400px 1fr; gap:0; max-width:1440px; margin:0 auto; padding:0 28px 40px; min-height:calc(100vh - 300px); }

/* ── LIST ── */
.list-panel { border-right:1px solid var(--border); padding-right:16px; overflow-y:auto; max-height:calc(100vh - 340px); }
.list-panel::-webkit-scrollbar { width:3px; }
.list-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.card { display:flex; gap:0; padding:0; border-radius:var(--radius); cursor:pointer; transition:background var(--transition); margin-bottom:2px; overflow:hidden; }
.card:hover { background:var(--bg-card-hover); }
.card.selected { background:var(--bg-card-selected); }
.card-color-bar { width:3px; min-height:100%; flex-shrink:0; border-radius:3px 0 0 3px; }
.card-color-bar.claude-ai { background:var(--source-claude); }
.card-color-bar.claude-code { background:var(--source-code); }
.card-color-bar.lilys { background:var(--source-lilys); }
.card-color-bar.memo { background:var(--source-memo); }
.card-content { padding:12px 14px; flex:1; min-width:0; }
.card-meta { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.source-badge { display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:500; font-family:var(--font-mono); padding:2px 7px; border-radius:3px; letter-spacing:0.01em; }
.source-badge.claude-ai { background:rgba(217,119,6,0.12); color:var(--source-claude); }
.source-badge.claude-code { background:rgba(5,150,105,0.12); color:var(--source-code); }
.source-badge.lilys { background:rgba(124,58,237,0.12); color:var(--source-lilys); }
.source-badge.memo { background:rgba(115,115,115,0.12); color:var(--source-memo); }
.card-date { font-size:11px; color:var(--text-secondary); font-family:var(--font-mono); }
.card-title { font-size:13.5px; font-weight:500; line-height:1.4; margin-bottom:3px; letter-spacing:-0.01em; }
.card-excerpt { font-size:12px; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
/* card 하단에 project + action 표시 */
.card-dim-tags { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; align-items:center; }
.card-dim-tags .dim-project { font-size:10px; color:var(--accent); font-family:var(--font-mono); }
.card-dim-tags .dim-type { font-size:10px; color:var(--text-secondary); font-family:var(--font-mono); }
.action-pill { font-size:9.5px; font-weight:600; padding:1px 7px; border-radius:10px; color:#fff; }
.action-pill.후속작업 { background:var(--action-todo); }
.action-pill.참고 { background:var(--action-ref); }
.action-pill.반영완료 { background:var(--action-done); }
.action-pill.보류 { background:var(--action-hold); }
mark { background:var(--highlight); color:inherit; padding:0 1px; border-radius:2px; }
.list-empty { padding:60px 16px; text-align:center; color:var(--text-secondary); font-size:13px; }

/* ── DETAIL ── */
.detail-panel { padding-left:24px; overflow-y:auto; max-height:calc(100vh - 340px); }
.detail-panel::-webkit-scrollbar { width:3px; }
.detail-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:var(--text-secondary); font-size:13px; gap:6px; }
.detail-empty .empty-icon { font-size:28px; opacity:0.4; }
.detail-header { margin-bottom:20px; }
.detail-header .detail-meta { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.detail-header h2 { font-size:20px; font-weight:600; letter-spacing:-0.03em; line-height:1.35; margin-bottom:4px; }
.detail-header .detail-date { font-size:12px; color:var(--text-secondary); font-family:var(--font-mono); }
.detail-summary { background:var(--bg-card); border-radius:var(--radius); padding:16px 18px; margin-bottom:18px; border-left:3px solid var(--accent); }
.detail-summary h3 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-secondary); margin-bottom:8px; }
.detail-summary p { font-size:13.5px; line-height:1.7; }
.detail-body { font-size:14px; line-height:1.75; margin-bottom:20px; }
.detail-body h4 { font-size:14.5px; font-weight:600; margin:18px 0 6px; letter-spacing:-0.02em; }
.detail-body p { margin-bottom:10px; }
.detail-body ul { margin:6px 0 10px 18px; font-size:13.5px; }
.detail-body li { margin-bottom:3px; }
.detail-body code { font-family:var(--font-mono); font-size:12px; background:var(--bg-tag); padding:2px 5px; border-radius:3px; }
.detail-links { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
.detail-links a { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; font-size:12px; font-weight:500; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); text-decoration:none; transition:all var(--transition); }
.detail-links a:hover { border-color:var(--accent); color:var(--accent); }

/* 3차원 태그 표시 (디테일) */
.detail-dimensions { margin-bottom:18px; }
.dim-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.dim-row-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--dim-label); min-width:42px; }
.dim-row .dtag { display:inline-flex; align-items:center; gap:3px; padding:3px 9px; font-size:11.5px; font-weight:500; border-radius:20px; background:var(--bg-tag); color:var(--text-secondary); }
.dtag .remove-tag { cursor:pointer; font-size:13px; line-height:1; opacity:0.5; transition:opacity var(--transition); background:none; border:none; color:inherit; padding:0 0 0 2px; }
.dtag .remove-tag:hover { opacity:1; }

/* 보조 태그 */
.detail-free-tags { margin-bottom:18px; }
.detail-free-tags .dtag-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--dim-label); margin-bottom:5px; }
.detail-free-tags-list { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
.add-tag-btn { display:inline-flex; align-items:center; gap:3px; padding:3px 9px; font-size:11.5px; font-weight:500; border-radius:20px; background:transparent; border:1px dashed var(--border); color:var(--text-secondary); cursor:pointer; font-family:var(--font-sans); transition:all var(--transition); }
.add-tag-btn:hover { border-color:var(--accent); color:var(--accent); }
.tag-input-wrap { display:none; align-items:center; }
.tag-input-wrap.show { display:inline-flex; }
.tag-input-wrap input { width:100px; padding:3px 8px; font-size:11.5px; font-family:var(--font-sans); border:1px solid var(--border); border-radius:20px; background:var(--bg-input); color:var(--text); outline:none; }
.tag-input-wrap input:focus { border-color:var(--accent); }

/* Memo */
.detail-memo { margin-bottom:18px; }
.detail-memo label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-secondary); margin-bottom:6px; }
.detail-memo textarea { width:100%; min-height:70px; padding:10px 12px; font-size:13px; font-family:var(--font-sans); border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-input); color:var(--text); resize:vertical; outline:none; transition:border-color var(--transition); }
.detail-memo textarea:focus { border-color:var(--border-focus); }

/* Actions */
.detail-actions { display:flex; gap:6px; padding-top:14px; border-top:1px solid var(--border); }
.btn { padding:7px 16px; font-size:12.5px; font-weight:500; font-family:var(--font-sans); border-radius:var(--radius-sm); cursor:pointer; transition:all var(--transition); border:1px solid var(--border); background:var(--bg-panel); color:var(--text); }
.btn:hover { border-color:var(--text-secondary); }
.btn-primary { background:var(--tab-active-bg); color:var(--tab-active-text); border-color:transparent; }
.btn-primary:hover { opacity:0.85; }
.btn-publish { background:var(--accent); color:#fff; border-color:transparent; }
.btn-publish:hover { opacity:0.85; }

footer { text-align:center; padding:20px; font-size:11.5px; color:var(--text-secondary); border-top:1px solid var(--border); }

@media (max-width:900px) {
  .main-layout { grid-template-columns:1fr; }
  .list-panel { border-right:none; border-bottom:1px solid var(--border); padding-right:0; padding-bottom:12px; max-height:40vh; }
  .detail-panel { padding-left:0; padding-top:16px; }
  .archive-header,.controls { padding-left:16px; padding-right:16px; }
  .main-layout { padding:0 16px 40px; }
  nav { padding:14px 16px; }
  .filter-row { flex-direction:column; gap:4px; }
  .filter-label { min-width:auto; padding-top:0; }
}
</style>
</head>
<body>

<nav>
  <a href="https://galincia-hub.github.io/kangs-blog/index.html" class="logo">Pagery</a>
  <div class="nav-links">
    <a href="https://galincia-hub.github.io/kangs-blog/blog/index.html">블로그 바로가기</a>
    <a href="#" class="active">아카이브</a>
    <button class="theme-toggle" onclick="toggleTheme()" title="테마 전환">☀️</button>
  </div>
</nav>

<div class="archive-header">
  <h1>작업 아카이브</h1>
  <p>Claude Code · Claude.ai · Lilys AI — 작업 기록을 모아두고, 골라서 블로그에 올린다.</p>
</div>

<div class="controls">
  <div class="tabs-row">
    <div class="tabs">
      <button class="tab active" data-tab="inbox" onclick="switchTab('inbox')">수집<span class="count" id="count-inbox">0</span></button>
      <button class="tab" data-tab="shortlist" onclick="switchTab('shortlist')">선별<span class="count" id="count-shortlist">0</span></button>
      <button class="tab" data-tab="published" onclick="switchTab('published')">발행완료<span class="count" id="count-published">0</span></button>
    </div>
    <button class="sort-toggle" onclick="toggleSort()" id="sortBtn">↓ 최신순</button>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="제목, 태그, 내용 검색..." oninput="filterCards()">
  </div>
  <!-- ★ 차원별 3행 필터 -->
  <div class="filter-section" id="filterSection"></div>
</div>

<div class="main-layout">
  <div class="list-panel" id="listPanel"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty"><span class="empty-icon">📋</span>글을 선택하면 여기에 표시됩니다</div>
  </div>
</div>

<footer>© 2026 Pagery</footer>

<script>
const SOURCE_META = {
  'claude-ai':   { icon:'💬', label:'claude.ai' },
  'claude-code': { icon:'⌨️', label:'claude code' },
  'lilys':       { icon:'🎬', label:'lilys ai' },
  'memo':        { icon:'📝', label:'memo' }
};
const LINK_META = {
  claude_ai:   { icon:'💬', label:'Claude 대화' },
  claude_code: { icon:'⌨️', label:'Code 세션' },
  source:      { icon:'🔗', label:'원본' },
  github:      { icon:'🔗', label:'GitHub' },
  blog:        { icon:'📄', label:'블로그 글' },
  related:     { icon:'🔗', label:'관련 링크' }
};
const TYPE_LIST = ['정보분석','작업로그','의사결정','트러블슈팅','설계','발견','회고'];
const ACTION_LIST = ['후속작업','참고','반영완료','보류'];

// ── DATA: archive.json에서 로드 ──
let archiveData = [];

// ── STATE ──
let currentTab = "inbox";
let selectedId = null;
let activeProjects = new Set();
let activeTypes = new Set();
let activeActions = new Set();
let searchQuery = "";
let sortAsc = false;

// ── INIT ──
async function init() {
  const saved = localStorage.getItem('pagery-theme');
  const el = document.documentElement;
  const btn = document.querySelector('.theme-toggle');
  if (saved === 'light') { el.removeAttribute('data-theme'); btn.textContent = '🌙'; }
  else { el.setAttribute('data-theme','dark'); btn.textContent = '☀️'; }

  // archive.json에서 데이터 로드
  try {
    const res = await fetch('archive.json');
    archiveData = await res.json();
  } catch(e) {
    console.error('archive.json 로드 실패:', e);
    document.getElementById('listPanel').innerHTML = '<div class="list-empty">archive.json을 불러올 수 없습니다</div>';
    return;
  }
  renderFilters();
  renderList();
  updateCounts();
}
function toggleTheme() {
  const el = document.documentElement; const btn = document.querySelector('.theme-toggle');
  if (el.getAttribute('data-theme')==='dark') { el.removeAttribute('data-theme'); btn.textContent='🌙'; localStorage.setItem('pagery-theme','light'); }
  else { el.setAttribute('data-theme','dark'); btn.textContent='☀️'; localStorage.setItem('pagery-theme','dark'); }
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab; selectedId = null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  renderList(); showEmptyDetail();
}
function updateCounts() {
  document.getElementById('count-inbox').textContent = archiveData.filter(d=>d.status==='inbox').length;
  document.getElementById('count-shortlist').textContent = archiveData.filter(d=>d.status==='shortlist').length;
  document.getElementById('count-published').textContent = archiveData.filter(d=>d.status==='published').length;
}
function toggleSort() { sortAsc=!sortAsc; document.getElementById('sortBtn').textContent = sortAsc?'↑ 오래된순':'↓ 최신순'; renderList(); }

// ── 3차원 필터 렌더링 ──
function renderFilters() {
  // 프로젝트 대분류 추출
  const allProjects = [...new Set(archiveData.flatMap(d=>d.project.map(p=>p.split('/')[0])))].sort();
  const projectChips = allProjects.map(p =>
    `<button class="tag-chip" data-dim="project" data-val="${p}" onclick="toggleFilter('project','${p}')">${p}</button>`
  ).join('');
  const typeChips = TYPE_LIST.map(t =>
    `<button class="tag-chip" data-dim="type" data-val="${t}" onclick="toggleFilter('type','${t}')">@${t}</button>`
  ).join('');
  const actionChips = ACTION_LIST.map(a =>
    `<button class="tag-chip" data-dim="action" data-val="${a}" data-action="${a}" onclick="toggleFilter('action','${a}')">!${a}</button>`
  ).join('');
  document.getElementById('filterSection').innerHTML = `
    <div class="filter-row"><span class="filter-label">프로젝트</span><div class="filter-chips">${projectChips}</div></div>
    <div class="filter-row"><span class="filter-label">유형</span><div class="filter-chips">${typeChips}</div></div>
    <div class="filter-row"><span class="filter-label">상태</span><div class="filter-chips">${actionChips}</div></div>
  `;
}
function toggleFilter(dim, val) {
  const set = dim==='project' ? activeProjects : dim==='type' ? activeTypes : activeActions;
  if (set.has(val)) set.delete(val); else set.add(val);
  document.querySelectorAll(`.tag-chip[data-dim="${dim}"]`).forEach(chip => {
    chip.classList.toggle('active', (dim==='project'?activeProjects:dim==='type'?activeTypes:activeActions).has(chip.dataset.val));
  });
  renderList();
}

// ── FILTER ──
function filterCards() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderList(); }
function getFiltered() {
  let items = archiveData.filter(d => {
    if (d.status !== currentTab) return false;
    // 차원 간 AND, 차원 내 OR
    if (activeProjects.size > 0 && !d.project.some(p => [...activeProjects].some(ap => p.startsWith(ap)))) return false;
    if (activeTypes.size > 0 && !activeTypes.has(d.type)) return false;
    if (activeActions.size > 0 && !activeActions.has(d.action)) return false;
    if (searchQuery) {
      const hay = (d.title + d.excerpt + d.tags.join(' ') + d.project.join(' ') + d.type + d.action + d.body).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });
  items.sort((a,b) => sortAsc ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));
  return items;
}

function highlightText(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── RENDER LIST ──
function renderList() {
  const items = getFiltered();
  const panel = document.getElementById('listPanel');
  if (items.length === 0) { panel.innerHTML = '<div class="list-empty">표시할 항목이 없습니다</div>'; return; }
  const sm = SOURCE_META;
  panel.innerHTML = items.map(d => `
    <div class="card ${selectedId===d.id?'selected':''}" onclick="selectCard(${d.id})">
      <div class="card-color-bar ${d.source}"></div>
      <div class="card-content">
        <div class="card-meta">
          <span class="source-badge ${d.source}">${sm[d.source].icon} ${sm[d.source].label}</span>
          <span class="card-date">${d.date}</span>
        </div>
        <div class="card-title">${highlightText(escHtml(d.title), searchQuery)}</div>
        <div class="card-excerpt">${highlightText(escHtml(d.excerpt), searchQuery)}</div>
        <div class="card-dim-tags">
          ${d.project.map(p=>`<span class="dim-project">${p}</span>`).join('')}
          <span class="dim-type">@${d.type}</span>
          <span class="action-pill ${d.action}">!${d.action}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function showEmptyDetail() {
  document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><span class="empty-icon">📋</span>글을 선택하면 여기에 표시됩니다</div>';
}

// ── DETAIL ──
function selectCard(id) {
  selectedId = id; renderList();
  const d = archiveData.find(x=>x.id===id);
  if (!d) return;
  const sm = SOURCE_META;

  // links 렌더링 (확장형)
  let linksHtml = '';
  for (const [k,v] of Object.entries(d.links)) {
    if (k === 'related' && Array.isArray(v)) {
      v.forEach((url,i) => { linksHtml += `<a href="${url}" target="_blank">🔗 관련 ${i+1}</a>`; });
    } else if (v) {
      const m = LINK_META[k] || {icon:'🔗',label:k};
      linksHtml += `<a href="${v}" target="_blank">${m.icon} ${m.label}</a>`;
    }
  }

  const statusBtns = d.status === 'inbox'
    ? `<button class="btn btn-primary" onclick="moveStatus(${d.id},'shortlist')">→ 선별로 이동</button><button class="btn" onclick="moveStatus(${d.id},'published')">→ 바로 발행</button>`
    : d.status === 'shortlist'
    ? `<button class="btn btn-publish" onclick="moveStatus(${d.id},'published')">📝 블로그 발행</button><button class="btn" onclick="moveStatus(${d.id},'inbox')">← 수집으로</button>`
    : `<button class="btn" onclick="moveStatus(${d.id},'shortlist')">← 선별로</button>`;

  // 3차원 태그 표시
  const dimHtml = `
    <div class="dim-row"><span class="dim-row-label">프로젝트</span>${d.project.map(p=>`<span class="dtag">${p}</span>`).join('')}</div>
    <div class="dim-row"><span class="dim-row-label">유형</span><span class="dtag">@${d.type}</span></div>
    <div class="dim-row"><span class="dim-row-label">상태</span><span class="action-pill ${d.action}" style="font-size:11px;padding:2px 9px;">!${d.action}</span></div>
  `;

  // 보조 태그
  const freeTagsHtml = d.tags.map((t,i) =>
    `<span class="dtag">#${t}<button class="remove-tag" onclick="removeTag(${d.id},${i})">×</button></span>`
  ).join('') +
  `<button class="add-tag-btn" onclick="showTagInput(${d.id})">+ 태그</button>
   <span class="tag-input-wrap" id="tagInput-${d.id}">
     <input placeholder="태그명" onkeydown="if(event.key==='Enter')addTag(${d.id},this.value)">
   </span>`;

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div class="detail-meta">
        <span class="source-badge ${d.source}">${sm[d.source].icon} ${sm[d.source].label}</span>
        <span class="detail-date">${d.date}</span>
      </div>
      <h2>${d.title}</h2>
    </div>
    <div class="detail-summary"><h3>AI 요약</h3><p>${d.summary}</p></div>
    <div class="detail-body">${d.body}</div>
    <div class="detail-links">${linksHtml}</div>
    <div class="detail-dimensions">${dimHtml}</div>
    <div class="detail-free-tags">
      <div class="dtag-label">보조 태그</div>
      <div class="detail-free-tags-list">${freeTagsHtml}</div>
    </div>
    <div class="detail-memo">
      <label>내 메모</label>
      <textarea placeholder="메모를 입력하세요..." onchange="saveMemo(${d.id},this.value)">${d.memo}</textarea>
    </div>
    <div class="detail-actions">${statusBtns}</div>
  `;
}

function moveStatus(id, ns) {
  const item = archiveData.find(x=>x.id===id);
  if (item) { item.status=ns; updateCounts(); switchTab(ns); selectCard(id); }
}
function saveMemo(id, val) { const item = archiveData.find(x=>x.id===id); if(item) item.memo=val; }
function showTagInput(id) {
  const el = document.getElementById('tagInput-'+id);
  el.classList.toggle('show');
  if (el.classList.contains('show')) el.querySelector('input').focus();
}
function addTag(id, val) {
  val = val.trim(); if(!val) return;
  const item = archiveData.find(x=>x.id===id);
  if (item && !item.tags.includes(val)) { item.tags.push(val); selectCard(id); }
}
function removeTag(id, idx) {
  const item = archiveData.find(x=>x.id===id);
  if (item) { item.tags.splice(idx,1); selectCard(id); }
}

init();
</script>
</body>
</html>
