<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Pagery</title>
  <meta name="description" content="{{EXCERPT}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{EXCERPT}}">
  <meta property="og:type" content="article">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "{{TITLE}}",
      "author": { "@type": "Person", "name": "Pagery" },
      "datePublished": "{{DATE}}",
      "description": "{{EXCERPT}}"
    },
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "홈", "item": "https://kangs-blog.com" },
        { "@type": "ListItem", "position": 2, "name": "블로그", "item": "https://kangs-blog.com/blog/" },
        { "@type": "ListItem", "position": 3, "name": "{{TITLE}}", "item": "https://kangs-blog.com/blog/{{SLUG}}.html" }
      ]
    }
  ]
  </script>
</head>
<body>

<div class="page">
  <nav class="site-nav">
    <a href="../index.html" class="nav-logo">Pagery</a>
    <div class="nav-right">
      <a href="index.html">블로그</a>
      <a href="../about.html">About</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="다크모드 전환" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="post-hero">
    <div class="post-breadcrumb">
      <a href="../index.html">홈</a><span>›</span>
      <a href="index.html">블로그</a><span>›</span>
      {{CATEGORY_FIRST}}
    </div>
    <div class="post-hero-cats">{{CATEGORY_BADGES}}</div>
    <h1 class="post-title">{{TITLE}}</h1>
    <div class="post-meta-row">
      <span>Pagery</span>
      <span>{{DATE_KO}}</span>
      {{TAG_BADGES}}
    </div>
  </div>

  <article class="post-content">

    <h2>이번 주에 뭘 했나</h2>
    <p>{{SECTION_1}}</p>

    <h2>어디서 막혔나</h2>
    <p>{{SECTION_2}}</p>

    <h2>어떻게 넘겼나</h2>
    <p>{{SECTION_3}}</p>

    <h2>뭘 배웠나</h2>
    <blockquote>{{LESSON}}</blockquote>

    <h2>더 보기</h2>
    <ul>
      <li><a href="https://github.com/galincia-hub" target="_blank">GitHub →</a></li>
    </ul>

  </article>

  <aside class="toc-sidebar" id="toc-sidebar">
    <p class="toc-title">목차</p>
    <nav id="toc-nav"></nav>
  </aside>

  <section class="post-related">
    <h3>관련 글</h3>
    <ul class="related-list" id="related-list"></ul>
  </section>

  <footer>
    <p>© 2026 Pagery</p>
  </footer>
</div>

<script src="../js/main.js"></script>
<script>
  loadPosts({ postsPath: '../blog/posts.json' }).then(posts => {
    const related = posts.filter(p => p.slug !== '{{SLUG}}').slice(0, 4);
    const list = document.getElementById('related-list');
    if (list) list.innerHTML = related.map(p => `<li><a href="${p.slug}.html">${p.title}</a></li>`).join('');
  });
</script>
</body>
</html>
