<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블로그 — Pagery</title>
  <meta name="description" content="여행업 AI 전환 기록. 주간 작업 로그.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page">
  <nav class="site-nav">
    <a href="../index.html" class="nav-logo">Pagery</a>
    <div class="nav-right">
      <a href="index.html">블로그</a>
      <a href="../about.html">About</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="다크모드 전환" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="cat-filter">
    <button class="cat-btn active" data-cat="전체">전체</button>
    <button class="cat-btn" data-cat="AI 활용기">AI 활용기</button>
    <button class="cat-btn" data-cat="크루즈 인사이트">크루즈 인사이트</button>
    <button class="cat-btn" data-cat="작업일지">작업일지</button>
  </div>

  <ul class="post-list" id="post-list">
    <li class="post-list-item" style="color: var(--sub); font-size: 0.9rem;">불러오는 중...</li>
  </ul>

  <footer>
    <p>© 2026 Pagery</p>
  </footer>
</div>

<script src="../js/main.js"></script>
<script>
  const list = document.getElementById('post-list');
  loadPosts({ postsPath: 'posts.json' }).then(posts => {
    renderMinimalList(list, posts, '');
  });
  initCatFilter({ container: list, slugPrefix: '', postsPath: 'posts.json' });
</script>
</body>
</html>
