<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pagery</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">Pagery</a>
    <div class="nav-right">
      <a href="blog/index.html">블로그</a>
      <a href="about.html">About</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="다크모드 전환" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div id="login-section" class="admin-login-box">
    <h2>관리자</h2>
    <div class="form-group">
      <label for="pwd">비밀번호</label>
      <input type="password" id="pwd" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <p class="admin-error" id="admin-error">비밀번호가 틀렸습니다.</p>
    <button class="btn" onclick="checkPassword()">로그인</button>
  </div>

  <div id="admin-panel" class="admin-panel">
    <div class="admin-stats">
      <div><div class="stat-num" id="stat-total">-</div><div class="stat-label">전체 글</div></div>
      <div><div class="stat-num" id="stat-pinned">-</div><div class="stat-label">고정 글</div></div>
      <div><div class="stat-num" id="stat-cats">-</div><div class="stat-label">카테고리</div></div>
    </div>
    <table class="admin-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>제목</th>
          <th>카테고리</th>
          <th>고정</th>
        </tr>
      </thead>
      <tbody id="admin-tbody"></tbody>
    </table>
    <p style="margin-top: 1.5rem;"><button class="btn" onclick="logout()" style="font-size:0.82rem; padding: 0.3rem 0.8rem;">로그아웃</button></p>
  </div>

  <footer>
    <p>© 2026 Pagery</p>
  </footer>
</div>

<script src="js/main.js"></script>
<script>
  const ADMIN_PW = 'kang2026';

  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function checkPassword() {
    if (document.getElementById('pwd').value === ADMIN_PW) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadAdminData();
    } else {
      document.getElementById('admin-error').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('login-section').style.display = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('pwd').value = '';
  }

  async function loadAdminData() {
    const res = await fetch('blog/posts.json');
    const posts = await res.json();
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    document.getElementById('stat-total').textContent = posts.length;
    document.getElementById('stat-pinned').textContent = posts.filter(p => p.pinned).length;

    const catMap = {};
    posts.forEach(p => p.category.forEach(c => { catMap[c] = (catMap[c] || 0) + 1; }));
    document.getElementById('stat-cats').textContent = Object.keys(catMap).length;

    const tbody = document.getElementById('admin-tbody');
    tbody.innerHTML = posts.map(p => `
      <tr>
        <td>${p.date}</td>
        <td class="admin-table-title">${p.title}</td>
        <td>${p.category.join(', ')}</td>
        <td>${p.pinned ? '📌' : ''}</td>
      </tr>`).join('');
  }
</script>
</body>
</html>
